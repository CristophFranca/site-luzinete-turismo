<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Fundo gradiente azul -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C3159;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A4A82;stop-opacity:1" />
    </linearGradient>
    <!-- Brilho sutil no topo -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="200" height="200" rx="44" ry="44"/>
    </clipPath>
    <!-- Sombra do ícone -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#bgGrad)"/>
  <!-- Camada de brilho -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#shineGrad)"/>

  <!-- Ponto laranja decorativo (canto superior direito) -->
  <circle cx="162" cy="38" r="10" fill="#E8700A" opacity="0.9"/>
  <!-- Linha laranja fina (detalhe) -->
  <rect x="152" y="18" width="3" height="32" rx="1.5" fill="#E8700A" opacity="0.5"/>

  <!-- ÔNIBUS — grupo com sombra -->
  <g filter="url(#iconShadow)">

    <!-- Carroceria principal -->
    <rect x="34" y="68" width="132" height="72" rx="10" ry="10" fill="#ffffff" opacity="0.97"/>

    <!-- Para-brisa dianteiro (direita) -->
    <path d="M136 68 L158 68 Q166 68 166 76 L166 100 L136 100 Z" fill="#B8D4F0" opacity="0.85"/>

    <!-- Janelas laterais (3 janelas) -->
    <rect x="44"  y="76" width="22" height="18" rx="4" fill="#B8D4F0" opacity="0.85"/>
    <rect x="74"  y="76" width="22" height="18" rx="4" fill="#B8D4F0" opacity="0.85"/>
    <rect x="104" y="76" width="22" height="18" rx="4" fill="#B8D4F0" opacity="0.85"/>

    <!-- Porta -->
    <rect x="44" y="102" width="22" height="28" rx="3" fill="#E8F0FB" opacity="0.7"/>
    <line x1="55" y1="102" x2="55" y2="130" stroke="#B8D4F0" stroke-width="1.5"/>

    <!-- Frente do ônibus -->
    <rect x="158" y="68" width="8" height="72" rx="4" fill="#E8700A"/>

    <!-- Grade frontal (detalhe laranja) -->
    <rect x="158" y="88" width="8" height="3"  rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="158" y="95" width="8" height="3"  rx="1" fill="#ffffff" opacity="0.6"/>

    <!-- Farol dianteiro -->
    <rect x="159" y="75" width="6" height="8" rx="2" fill="#FFE066"/>

    <!-- Faixa laranja na lateral -->
    <rect x="34" y="118" width="124" height="6" rx="0" fill="#E8700A" opacity="0.85"/>

    <!-- Pneus -->
    <circle cx="65"  cy="144" r="16" fill="#2A2A2A"/>
    <circle cx="65"  cy="144" r="9"  fill="#444"/>
    <circle cx="65"  cy="144" r="4"  fill="#E8700A"/>

    <circle cx="140" cy="144" r="16" fill="#2A2A2A"/>
    <circle cx="140" cy="144" r="9"  fill="#444"/>
    <circle cx="140" cy="144" r="4"  fill="#E8700A"/>

    <!-- Eixo entre rodas -->
    <rect x="74" y="142" width="57" height="4" rx="2" fill="#333"/>

    <!-- Placa (detalhe) -->
    <rect x="148" y="126" width="16" height="8" rx="2" fill="#F5F5F5"/>
    <rect x="149" y="127" width="14" height="6" rx="1" fill="#1C3159"/>

  </g>

  <!-- Letras "LZ" sutis no canto inferior esquerdo -->
  <text x="20" y="188" font-family="Georgia, serif" font-style="italic" font-weight="bold"
        font-size="16" fill="#ffffff" opacity="0.25" letter-spacing="1">LZ</text>
</svg>
